const { useState, useMemo } = React;


// ============================================================
// MATERIAL DATABASE
// E in psi (modulus of elasticity along grain / strong axis)
// E_perp_ratio: ratio of E perpendicular-to-grain over E parallel-to-grain.
//   For solid wood, this is roughly E_radial/E_L ≈ 0.05–0.08 (Wood Handbook
//   Table 5-1). For plywood/engineered, behavior is closer to isotropic in-plane.
//   For metals, ratio = 1.0 (isotropic).
// nu = Poisson's ratio
// ============================================================
const MATERIALS = {
  // Hardwoods — clear wood, 12% MC, E parallel to grain
  white_oak:      { name: 'White Oak',         E: 1_780_000, E_perp_ratio: 0.072, density: 0.68, nu: 0.37, category: 'Hardwood' },
  red_oak:        { name: 'Red Oak',           E: 1_820_000, E_perp_ratio: 0.082, density: 0.63, nu: 0.37, category: 'Hardwood' },
  hard_maple:     { name: 'Hard Maple (Sugar)', E: 1_830_000, E_perp_ratio: 0.132, density: 0.63, nu: 0.37, category: 'Hardwood' },
  soft_maple:     { name: 'Soft Maple (Red)',  E: 1_640_000, E_perp_ratio: 0.118, density: 0.54, nu: 0.37, category: 'Hardwood' },
  walnut:         { name: 'Black Walnut',      E: 1_680_000, E_perp_ratio: 0.106, density: 0.55, nu: 0.37, category: 'Hardwood' },

  spf:            { name: 'SPF (Spruce/Pine/Fir)', E: 1_400_000, E_perp_ratio: 0.078, density: 0.42, nu: 0.37, category: 'Softwood' },
  cedar_wrc:      { name: 'Western Red Cedar', E: 1_110_000, E_perp_ratio: 0.055, density: 0.32, nu: 0.37, category: 'Softwood' },

  // Engineered wood — closer to isotropic in-plane (cross-laminated layup)
  baltic_birch:   { name: 'Baltic Birch Plywood', E: 1_700_000, E_perp_ratio: 0.50, density: 0.65, nu: 0.30, category: 'Engineered' },

  particleboard:  { name: 'Particleboard',     E: 350_000,   E_perp_ratio: 1.00, density: 0.70, nu: 0.25, category: 'Engineered' },
  osb:            { name: 'OSB',               E: 800_000,   E_perp_ratio: 0.50, density: 0.65, nu: 0.30, category: 'Engineered' },
  lvl:            { name: 'LVL (typ. 2.0E)',   E: 2_000_000, E_perp_ratio: 0.05, density: 0.50, nu: 0.30, category: 'Engineered' },

  // Metals — isotropic
  steel_a36:      { name: 'Steel (A36)',       E: 29_000_000, E_perp_ratio: 1.00, density: 7.85, nu: 0.30, category: 'Metal' },
  aluminum_6061:  { name: 'Aluminum 6061-T6',  E: 10_000_000, E_perp_ratio: 1.00, density: 2.70, nu: 0.33, category: 'Metal' },
};

// ============================================================
// PLATE COEFFICIENTS (Timoshenko & Woinowsky-Krieger,
// "Theory of Plates and Shells", 2nd ed.)
// w_max = α · q · a⁴ / D, where D = E·t³ / (12(1-ν²))
// a = short side, b = long side, ratio r = b/a
// ============================================================

// 4 edges simply supported, uniform load (Table 8, p.120)
const PLATE_4SS = [
  { r: 1.0, alpha: 0.00406 },
  { r: 1.1, alpha: 0.00485 },
  { r: 1.2, alpha: 0.00564 },
  { r: 1.4, alpha: 0.00705 },
  { r: 1.6, alpha: 0.00830 },
  { r: 1.8, alpha: 0.00931 },
  { r: 2.0, alpha: 0.01013 },
  { r: 3.0, alpha: 0.01223 },
  { r: 4.0, alpha: 0.01282 },
  { r: 5.0, alpha: 0.01297 },
  { r: 99,  alpha: 0.01302 },  // infinite
];

// 4 edges clamped/fixed, uniform load (Table 35, p.202)
const PLATE_4FIXED = [
  { r: 1.0, alpha: 0.00126 },
  { r: 1.2, alpha: 0.00172 },
  { r: 1.4, alpha: 0.00207 },
  { r: 1.6, alpha: 0.00230 },
  { r: 1.8, alpha: 0.00245 },
  { r: 2.0, alpha: 0.00254 },
  { r: 99,  alpha: 0.00260 },  // infinite
];

// 3 edges simply supported, 1 long edge free (Timoshenko Table 46)
// a = span between supports (perpendicular to free edge), b = length of free edge
// Max deflection at center of free edge.
// ratio = b/a
const PLATE_3SS_1FREE = [
  { r: 0.5, alpha: 0.00710 },
  { r: 1.0, alpha: 0.01309 },
  { r: 1.5, alpha: 0.01521 },
  { r: 2.0, alpha: 0.01580 },
  { r: 3.0, alpha: 0.01605 },
  { r: 99,  alpha: 0.01611 },
];

// ============================================================
// POINT-LOAD plate coefficients
// w_max = α · P · a² / D, where a is short side, P at center
// (Timoshenko Tables 23 & 36, ν = 0.3)
// ============================================================

// Point load at center, 4 edges simply supported (Table 23)
const PLATE_4SS_PT = [
  { r: 1.0, alpha: 0.01160 },
  { r: 1.2, alpha: 0.01353 },
  { r: 1.4, alpha: 0.01484 },
  { r: 1.6, alpha: 0.01570 },
  { r: 1.8, alpha: 0.01620 },
  { r: 2.0, alpha: 0.01651 },
  { r: 3.0, alpha: 0.01690 },
  { r: 99,  alpha: 0.01695 },
];

// Point load at center, 4 edges fixed (Table 36)
const PLATE_4FIXED_PT = [
  { r: 1.0, alpha: 0.00560 },
  { r: 1.2, alpha: 0.00647 },
  { r: 1.4, alpha: 0.00691 },
  { r: 1.6, alpha: 0.00712 },
  { r: 1.8, alpha: 0.00720 },
  { r: 2.0, alpha: 0.00722 },
  { r: 99,  alpha: 0.00725 },
];

// Point load at center of free edge, 3 edges SS, 1 free
// (Roark Table 11.4, case 8e — small-deflection theory)
// These are approximate; exact values depend on load position along the free edge
const PLATE_3SS_1FREE_PT = [
  { r: 0.5, alpha: 0.0633 },
  { r: 1.0, alpha: 0.1380 },
  { r: 1.5, alpha: 0.1922 },
  { r: 2.0, alpha: 0.2331 },
  { r: 3.0, alpha: 0.2716 },
  { r: 99,  alpha: 0.2873 },
];

// Linear interpolation for plate coefficient table
function interpolateAlpha(table, ratio) {
  if (ratio <= table[0].r) return table[0].alpha;
  if (ratio >= table[table.length - 1].r) return table[table.length - 1].alpha;
  for (let i = 0; i < table.length - 1; i++) {
    if (ratio >= table[i].r && ratio <= table[i + 1].r) {
      const t = (ratio - table[i].r) / (table[i + 1].r - table[i].r);
      return table[i].alpha + t * (table[i + 1].alpha - table[i].alpha);
    }
  }
  return table[table.length - 1].alpha;
}

// ============================================================
// CROSS-SECTION CALCULATORS
// Returns { I (in^4), c (in, distance to extreme fiber), area (in^2), label }
// ============================================================
function rectangularSection(b, h) {
  return {
    I: (b * h ** 3) / 12,
    c: h / 2,
    area: b * h,
    label: `${b}″ × ${h}″ rectangle`,
  };
}

function circularSection(d) {
  const r = d / 2;
  return {
    I: (Math.PI * d ** 4) / 64,
    c: r,
    area: Math.PI * r * r,
    label: `Ø${d}″ round`,
  };
}

function tubeSection(od, wall) {
  const id = od - 2 * wall;
  return {
    I: (Math.PI * (od ** 4 - id ** 4)) / 64,
    c: od / 2,
    area: (Math.PI * (od ** 2 - id ** 2)) / 4,
    label: `Ø${od}″ × ${wall}″ wall tube`,
  };
}

function rectTubeSection(B, H, t) {
  const b = B - 2 * t;
  const h = H - 2 * t;
  return {
    I: (B * H ** 3 - b * h ** 3) / 12,
    c: H / 2,
    area: B * H - b * h,
    label: `${B}″ × ${H}″ × ${t}″ rect tube`,
  };
}

function iBeamSection(bf, tf, hw, tw) {
  // Total depth = hw + 2*tf
  const H = hw + 2 * tf;
  // I = full rect minus removed side rectangles
  const Iouter = (bf * H ** 3) / 12;
  const removedWidth = (bf - tw) / 2;
  // two removed rectangles each of width removedWidth, height hw, centered
  const Iremoved = 2 * ((removedWidth * hw ** 3) / 12);
  const I = Iouter - Iremoved;
  const area = bf * H - 2 * removedWidth * hw;
  return {
    I,
    c: H / 2,
    area,
    label: `I-beam ${bf}″×${H}″ (flange ${tf}″, web ${tw}″)`,
  };
}

// ============================================================
// BEAM DEFLECTION FORMULAS
// All return max deflection in inches.
// E in psi, I in in^4, L in inches.
// Distributed load w in lb/in (NOT lb/ft); point load P in lb.
// ============================================================

// ============================================================
// BEAM SUPPORT TYPES & LOAD TYPES (split for cleaner UX)
// ============================================================

const BEAM_SUPPORTS = {
  cantilever:    { name: 'Cantilever',                 sides: '1 side (fixed end)' },
  simply_supp:   { name: 'Simply supported',           sides: '2 sides (pinned ends)' },
  fixed_fixed:   { name: 'Fixed-fixed (clamped both ends)', sides: '2 sides (fixed ends)' },
  prop_cant:     { name: 'Propped cantilever',         sides: '2 sides (1 fixed, 1 pinned)' },
};

// Each entry returns: { calc(E,I,L,load) → δ, formula string }
// 'udl' load is in lb/in.  'point' load is in lb (applied at worst location).
const BEAM_FORMULAS = {
  cantilever: {
    udl:   { calc: (E, I, L, w) => (w * L ** 4) / (8 * E * I),
             formula: 'δ = w·L⁴ / (8·E·I)',
             note: 'Max deflection at free end' },
    point: { calc: (E, I, L, P) => (P * L ** 3) / (3 * E * I),
             formula: 'δ = P·L³ / (3·E·I)',
             note: 'Point load at free end (worst case)' },
  },
  simply_supp: {
    udl:   { calc: (E, I, L, w) => (5 * w * L ** 4) / (384 * E * I),
             formula: 'δ = 5·w·L⁴ / (384·E·I)',
             note: 'Max deflection at mid-span' },
    point: { calc: (E, I, L, P) => (P * L ** 3) / (48 * E * I),
             formula: 'δ = P·L³ / (48·E·I)',
             note: 'Point load at mid-span (worst case)' },
  },
  fixed_fixed: {
    udl:   { calc: (E, I, L, w) => (w * L ** 4) / (384 * E * I),
             formula: 'δ = w·L⁴ / (384·E·I)',
             note: 'Max deflection at mid-span (5× stiffer than SS)' },
    point: { calc: (E, I, L, P) => (P * L ** 3) / (192 * E * I),
             formula: 'δ = P·L³ / (192·E·I)',
             note: 'Point load at mid-span (4× stiffer than SS)' },
  },
  prop_cant: {
    udl:   { calc: (E, I, L, w) => (w * L ** 4) / (185 * E * I),
             formula: 'δ_max ≈ w·L⁴ / (185·E·I)',
             note: 'Max deflection at ~0.58·L from fixed end' },
    // Point at midspan, propped cantilever (Roark Table 8.1)
    point: { calc: (E, I, L, P) => (7 * P * L ** 3) / (768 * E * I),
             formula: 'δ ≈ 7·P·L³ / (768·E·I)',
             note: 'Point load at mid-span' },
  },
};

// ============================================================
// PLATE CASES — return { delta, alpha }
// Each has tables for both uniform load (UDL) and center point load (PT)
// ============================================================

const PLATE_CASES = {
  plate_4ss: {
    name: '4 edges simply supported',
    sides: '4 sides',
    description: 'Top free to rotate at all 4 edges (a top sitting on 4 walls without rigid fastening). Most common case for inset cabinet shelves and tops.',
    pointLocation: 'center of plate',
    udlTable: PLATE_4SS,
    ptTable: PLATE_4SS_PT,
  },
  plate_4fixed: {
    name: '4 edges fixed (clamped)',
    sides: '4 sides',
    description: 'Top rigidly fastened at all 4 edges (rare in cabinetwork without heavy joinery — requires glued dadoes or equivalent).',
    pointLocation: 'center of plate',
    udlTable: PLATE_4FIXED,
    ptTable: PLATE_4FIXED_PT,
  },
  plate_3ss_1free: {
    name: '3 edges simply supported, 1 free',
    sides: '3 sides',
    description: 'Bench top supported on two ends + back, with a free front edge. a = front-to-back support distance, b = bench length. Max deflection occurs at center of free front edge.',
    pointLocation: 'center of free edge',
    udlTable: PLATE_3SS_1FREE,
    ptTable: PLATE_3SS_1FREE_PT,
  },
};

function calcPlate(material, t, a, b, load, caseKey, loadType) {
  // load is q (psi) for UDL, or P (lb) for point load
  const E = material.E;
  const nu = material.nu;
  const D = (E * t ** 3) / (12 * (1 - nu * nu));
  const ratio = b / a;
  const caseObj = PLATE_CASES[caseKey];
  const table = loadType === 'point' ? caseObj.ptTable : caseObj.udlTable;
  const alpha = interpolateAlpha(table, ratio);
  // Different formulas for the two load types:
  //   UDL:   δ = α · q · a⁴ / D
  //   point: δ = α · P · a² / D
  const delta = loadType === 'point'
    ? (alpha * load * a ** 2) / D
    : (alpha * load * a ** 4) / D;
  return { delta, alpha, D, ratio };
}

function NumberInput({ label, value, onChange, step = 0.001, unit, hint, min = 0 }) {
  return (
    <label className="flex flex-col gap-1">
      <span className="text-xs uppercase tracking-wider" style={{ color: colors.muted, letterSpacing: '0.08em' }}>

}

function Section({ title, children, num }) {

// DIAGRAMS — inline SVG illustrations of beam/plate cases.
// Beams shown in side elevation; plates in plan view.
// ============================================================

// Reusable SVG primitives
const ink = colors.ink;
const accent = colors.accent;
const muted = colors.muted;

function HatchingPattern() {
  // Reusable diagonal hatching for "ground" / fixed-support symbol
  return (
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke={ink} strokeWidth="1" />
    </pattern>
  );
}

function PinTriangle({ x, y }) {
  // Pinned support — triangle pointing up to beam
  const w = 8;
  return (
    <g>
      <polygon points={`${x},${y} ${x - w},${y + w * 1.4} ${x + w},${y + w * 1.4}`}
               fill="none" stroke={ink} strokeWidth="1.2" />
      <line x1={x - w - 4} y1={y + w * 1.4 + 1} x2={x + w + 4} y2={y + w * 1.4 + 1}
            stroke={ink} strokeWidth="1" />
    </g>
  );
}

function FixedWall({ x, height = 36, side = 'left' }) {
  // Fixed support — hatched wall on one side
  const dir = side === 'left' ? -1 : 1;
  const w = 6;
  return (
    <g>
      <line x1={x} y1={0} x2={x} y2={height} stroke={ink} strokeWidth="1.5" />
      <rect x={side === 'left' ? x - w : x} y={0} width={w} height={height} fill="url(#hatch)" />
    </g>
  );
}

function ArrowDown({ x, y, length = 14, color = accent }) {
  return (
    <g stroke={color} strokeWidth="1.4" fill={color}>
      <line x1={x} y1={y} x2={x} y2={y + length} />
      <polygon points={`${x},${y + length + 4} ${x - 3},${y + length - 1} ${x + 3},${y + length - 1}`} />
    </g>
  );
}

function UDLArrows({ x1, x2, y, count = 8, color = accent }) {
  const arrows = [];
  for (let i = 0; i <= count; i++) {
    const x = x1 + (i * (x2 - x1)) / count;
    arrows.push(<ArrowDown key={i} x={x} y={y} length={10} color={color} />);
  }
  // Top connecting line
  return (
    <g>
      <line x1={x1} y1={y} x2={x2} y2={y} stroke={color} strokeWidth="1" />
      {arrows}
    </g>
  );
}

// ===== BEAM DIAGRAMS =====

function BeamDiagram({ support, loadType }) {
  const W = 280, H = 110;
  const beamY = 48;
  const beamLeft = 40, beamRight = W - 40;
  const beamLen = beamRight - beamLeft;

  // Deflected shape (dashed) — different for each case
  // Returns SVG path "d" string
  const deflectedPath = () => {
    const sag = 18; // visual exaggeration
    const pts = [];
    const n = 30;
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      const x = beamLeft + t * beamLen;
      let y;
      if (support === 'cantilever') {
        // Fixed at left, free at right — deflects more at the tip
        if (loadType === 'udl') y = beamY + sag * t * t * (4 - t) / 4;
        else y = beamY + sag * t * t * (3 - t) / 2;
      } else if (support === 'simply_supp') {
        y = beamY + sag * 4 * t * (1 - t); // parabola, max at center
      } else if (support === 'fixed_fixed') {
        // Tangent to horizontal at both ends — flatter sag
        y = beamY + sag * 0.5 * Math.pow(Math.sin(Math.PI * t), 2);
      } else {
        // Propped cantilever: fixed at left, pinned at right, max sag ~0.58 from fixed
        y = beamY + sag * 0.7 * Math.pow(Math.sin(Math.PI * t), 1.3) * (1 - 0.2 * t);
      }
      pts.push(`${x},${y.toFixed(1)}`);
    }
    return 'M ' + pts.join(' L ');
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ maxWidth: 320, display: 'block' }}>
      <defs><HatchingPattern /></defs>

      {/* Load illustration */}
      {loadType === 'udl' && (
        <UDLArrows x1={beamLeft} x2={beamRight} y={20} count={8} />
      )}
      {loadType === 'point' && (
        <ArrowDown
          x={support === 'cantilever' ? beamRight - 4 : (beamLeft + beamRight) / 2}
          y={20}
          length={20}
        />
      )}

      {/* Beam (undeformed) */}
      <line x1={beamLeft} y1={beamY} x2={beamRight} y2={beamY}
            stroke={ink} strokeWidth="3" strokeLinecap="round" />

      {/* Deflected shape */}
      <path d={deflectedPath()} fill="none" stroke={muted} strokeWidth="1.2" strokeDasharray="3,3" />

      {/* Supports based on type */}
      {support === 'cantilever' && (
        <FixedWall x={beamLeft - 2} height={75} side="left" />
      )}
      {support === 'simply_supp' && (
        <>
          <PinTriangle x={beamLeft} y={beamY + 3} />
          <PinTriangle x={beamRight} y={beamY + 3} />
        </>
      )}
      {support === 'fixed_fixed' && (
        <>
          <FixedWall x={beamLeft - 2} height={75} side="left" />
          <FixedWall x={beamRight + 2} height={75} side="right" />
        </>
      )}
      {support === 'prop_cant' && (
        <>
          <FixedWall x={beamLeft - 2} height={75} side="left" />
          <PinTriangle x={beamRight} y={beamY + 3} />
        </>
      )}

      {/* Span dimension line */}
      <g stroke={muted} strokeWidth="0.8">
        <line x1={beamLeft} y1={H - 10} x2={beamRight} y2={H - 10} />
        <line x1={beamLeft} y1={H - 14} x2={beamLeft} y2={H - 6} />
        <line x1={beamRight} y1={H - 14} x2={beamRight} y2={H - 6} />
      </g>
      <text x={(beamLeft + beamRight) / 2} y={H - 13} textAnchor="middle"
            fontFamily="JetBrains Mono, monospace" fontSize="9" fill={muted}>L</text>
    </svg>
  );
}

// ===== PLATE DIAGRAMS (plan view) =====

function PlateDiagram({ caseKey, loadType }) {
  const W = 280, H = 160;
  // Plate proportional to a typical bench: long b, shorter a
  const plateLeft = 40, plateRight = W - 40;
  const plateTop = 30, plateBottom = H - 40;
  const plateW = plateRight - plateLeft;
  const plateH = plateBottom - plateTop;

  // Style for supported edges (thick line + hatching) vs free edges (thin dashed)
  const supportedColor = ink;
  const freeColor = muted;

  // Determine which edges are supported per case
  // 4ss: all 4
  // 4fixed: all 4 (we show with hatching to distinguish)
  // 3ss_1free: top, left, right supported; bottom free (we'll use bottom = free front)
  let edges;
  if (caseKey === 'plate_4ss') {
    edges = { top: 'ss', bottom: 'ss', left: 'ss', right: 'ss' };
  } else if (caseKey === 'plate_4fixed') {
    edges = { top: 'fixed', bottom: 'fixed', left: 'fixed', right: 'fixed' };
  } else {
    edges = { top: 'ss', bottom: 'free', left: 'ss', right: 'ss' };
  }

  const renderEdge = (type, x1, y1, x2, y2) => {
    if (type === 'free') {
      return <line x1={x1} y1={y1} x2={x2} y2={y2}
                   stroke={freeColor} strokeWidth="1.5" strokeDasharray="4,3" />;
    }
    // ss and fixed both shown as thick solid line
    return <line x1={x1} y1={y1} x2={x2} y2={y2}
                 stroke={supportedColor} strokeWidth="2.2" />;
  };

  // Hatching outside fixed/ss edges to indicate support
  const renderSupport = (type, x1, y1, x2, y2, outside) => {
    if (type === 'free') return null;
    // outside: 'top'|'bottom'|'left'|'right' — hatching is drawn outside the plate edge
    const w = 5;
    let hx1 = x1, hy1 = y1, hx2 = x2, hy2 = y2;
    let rx, ry, rw, rh;
    if (outside === 'top')    { rx = x1; ry = y1 - w; rw = x2 - x1; rh = w; }
    if (outside === 'bottom') { rx = x1; ry = y1;     rw = x2 - x1; rh = w; }
    if (outside === 'left')   { rx = x1 - w; ry = y1; rw = w; rh = y2 - y1; }
    if (outside === 'right')  { rx = x1; ry = y1;     rw = w; rh = y2 - y1; }
    return <rect x={rx} y={ry} width={rw} height={rh} fill="url(#hatch)" opacity={type === 'fixed' ? 1 : 0.6} />;
  };

  // Point load location
  const ptX = caseKey === 'plate_3ss_1free' ? (plateLeft + plateRight) / 2 : (plateLeft + plateRight) / 2;
  const ptY = caseKey === 'plate_3ss_1free' ? plateBottom - 3 : (plateTop + plateBottom) / 2;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ maxWidth: 320, display: 'block' }}>
      <defs><HatchingPattern /></defs>

      {/* Plate fill (lightly tinted to read as a surface) */}
      <rect x={plateLeft} y={plateTop} width={plateW} height={plateH}
            fill={colors.bg} stroke="none" />

      {/* Supports / hatching outside edges */}
      {renderSupport(edges.top, plateLeft, plateTop, plateRight, plateTop, 'top')}
      {renderSupport(edges.bottom, plateLeft, plateBottom, plateRight, plateBottom, 'bottom')}
      {renderSupport(edges.left, plateLeft, plateTop, plateLeft, plateBottom, 'left')}
      {renderSupport(edges.right, plateRight, plateTop, plateRight, plateBottom, 'right')}

      {/* Edges (drawn last so on top of hatching) */}
      {renderEdge(edges.top, plateLeft, plateTop, plateRight, plateTop)}
      {renderEdge(edges.bottom, plateLeft, plateBottom, plateRight, plateBottom)}
      {renderEdge(edges.left, plateLeft, plateTop, plateLeft, plateBottom)}
      {renderEdge(edges.right, plateRight, plateTop, plateRight, plateBottom)}

      {/* Load representation */}
      {loadType === 'udl' && (
        // grid of small downward markers across the plate, indicating uniform pressure
        <g fill={accent} opacity={0.55}>
          {(() => {
            const dots = [];
            const cols = 9, rows = 4;
            for (let i = 1; i < cols; i++) {
              for (let j = 1; j < rows; j++) {
                const x = plateLeft + (i * plateW) / cols;
                const y = plateTop + (j * plateH) / rows;
                dots.push(<circle key={`${i}-${j}`} cx={x} cy={y} r="1.5" />);
              }
            }
            return dots;
          })()}
        </g>
      )}
      {loadType === 'point' && (
        <g>
          <ArrowDown x={ptX} y={ptY - 24} length={14} />
          <circle cx={ptX} cy={ptY} r="3" fill={accent} />
        </g>
      )}

      {/* Labels for a and b */}
      <text x={(plateLeft + plateRight) / 2} y={H - 5} textAnchor="middle"
            fontFamily="JetBrains Mono, monospace" fontSize="9" fill={muted}>
        b {caseKey === 'plate_3ss_1free' ? '(bench length)' : '(long side)'}
      </text>
      <text x={plateLeft - 12} y={(plateTop + plateBottom) / 2} textAnchor="middle"
            fontFamily="JetBrains Mono, monospace" fontSize="9" fill={muted}
            transform={`rotate(-90 ${plateLeft - 12} ${(plateTop + plateBottom) / 2})`}>
        a {caseKey === 'plate_3ss_1free' ? '(depth)' : '(short side)'}
      </text>

      {/* Mini legend for 3-side case to be obvious */}
      {caseKey === 'plate_3ss_1free' && (
        <text x={(plateLeft + plateRight) / 2} y={plateBottom + 14} textAnchor="middle"
              fontFamily="JetBrains Mono, monospace" fontSize="8" fill={muted} fontStyle="italic">
          ↑ free front edge ↑
        </text>
      )}
    </svg>
  );
}

function DeflectionCalculator() {
  // Mode
  const [mode, setMode] = useState('beam'); // 'beam' or 'plate'

  // Material
  const [materialKey, setMaterialKey] = useState('white_oak');
  const material = MATERIALS[materialKey];

  // Grain orientation: 'parallel' = grain runs along the span (normal — strongest),
  // 'perpendicular' = grain runs across the span (rare — much weaker).
  // For isotropic materials (metals, MDF) this has no effect.
  const [grainOrientation, setGrainOrientation] = useState('parallel');
  const isWoodOrtho = material.E_perp_ratio < 0.95;
  const E_effective = grainOrientation === 'perpendicular' && isWoodOrtho
    ? material.E * material.E_perp_ratio
    : material.E;

  // ===== BEAM STATE =====
  const [beamSupport, setBeamSupport] = useState('simply_supp');
  const [beamLoadType, setBeamLoadType] = useState('udl'); // 'udl' or 'point'
  const [beamUdlEntry, setBeamUdlEntry] = useState('per_length'); // 'per_length' (lb/ft) or 'total' (lb)
  const [span, setSpan] = useState(48); // inches
  const [loadDist, setLoadDist] = useState(40); // lb/ft (will convert)
  const [loadDistTotal, setLoadDistTotal] = useState(160); // total lb spread along beam
  const [loadPoint, setLoadPoint] = useState(300); // lb
  const [sectionType, setSectionType] = useState('rect');
  const [rectB, setRectB] = useState(12);
  const [rectH, setRectH] = useState(0.75);
  const [circD, setCircD] = useState(2);
  const [tubeOD, setTubeOD] = useState(2);
  const [tubeWall, setTubeWall] = useState(0.125);
  const [rtB, setRtB] = useState(2);
  const [rtH, setRtH] = useState(3);
  const [rtT, setRtT] = useState(0.125);
  const [ibBf, setIbBf] = useState(4);
  const [ibTf, setIbTf] = useState(0.5);
  const [ibHw, setIbHw] = useState(6);
  const [ibTw, setIbTw] = useState(0.3);

  // ===== PLATE STATE =====
  const [plateCase, setPlateCase] = useState('plate_3ss_1free');
  const [plateLoadType, setPlateLoadType] = useState('udl'); // 'udl' or 'point'
  const [plateUdlEntry, setPlateUdlEntry] = useState('psf'); // 'psf' or 'total' (lb spread over full plate)
  const [plateA, setPlateA] = useState(18);  // short / front-to-back, in
  const [plateB, setPlateB] = useState(60);  // long / bench length, in
  const [plateT, setPlateT] = useState(0.75);
  const [plateLoad, setPlateLoad] = useState(40); // psf
  const [plateLoadTotal, setPlateLoadTotal] = useState(100); // total lb
  const [platePointLoad, setPlatePointLoad] = useState(300); // lb

  // ===== BEAM CALC =====
  const beamSection = useMemo(() => {
    switch (sectionType) {
      case 'rect': return rectangularSection(rectB, rectH);
      case 'circ': return circularSection(circD);
      case 'tube': return tubeSection(tubeOD, tubeWall);
      case 'recttube': return rectTubeSection(rtB, rtH, rtT);
      case 'ibeam': return iBeamSection(ibBf, ibTf, ibHw, ibTw);
      default: return rectangularSection(rectB, rectH);
    }
  }, [sectionType, rectB, rectH, circD, tubeOD, tubeWall, rtB, rtH, rtT, ibBf, ibTf, ibHw, ibTw]);

  const beamResult = useMemo(() => {
    if (mode !== 'beam') return null;
    const support = BEAM_SUPPORTS[beamSupport];
    const formulaObj = BEAM_FORMULAS[beamSupport][beamLoadType];
    const E = E_effective;
    const I = beamSection.I;
    const L = span;
    let delta, totalLoad, wDisplay;
    if (beamLoadType === 'udl') {
      // Compute w in lb/in regardless of entry mode
      let wInPerInch;
      if (beamUdlEntry === 'total') {
        // Total load spread over span L (inches)
        wInPerInch = loadDistTotal / L;
        wDisplay = `${(wInPerInch * 12).toFixed(1)} lb/ft (from ${loadDistTotal} lb total)`;
      } else {
        wInPerInch = loadDist / 12; // lb/ft → lb/in
        wDisplay = `${loadDist} lb/ft`;
      }
      delta = formulaObj.calc(E, I, L, wInPerInch);
      totalLoad = wInPerInch * L;
    } else {
      delta = formulaObj.calc(E, I, L, loadPoint);
      totalLoad = loadPoint;
      wDisplay = `${loadPoint} lb point`;
    }
    return {
      delta,
      ratio: L / delta,
      totalLoad,
      formula: formulaObj.formula,
      note: formulaObj.note,
      caseName: `${support.name} — ${beamLoadType === 'udl' ? 'uniform load' : 'point load'}`,
      sides: support.sides,
      loadType: beamLoadType,
      wDisplay,
      I, E,
    };
  }, [mode, beamSupport, beamLoadType, beamUdlEntry, E_effective, beamSection, span, loadDist, loadDistTotal, loadPoint]);

  const plateResult = useMemo(() => {
    if (mode !== 'plate') return null;
    const matForPlate = { ...material, E: E_effective };
    let aUsed = plateA, bUsed = plateB;
    if (plateCase !== 'plate_3ss_1free') {
      aUsed = Math.min(plateA, plateB);
      bUsed = Math.max(plateA, plateB);
    }
    let load, totalLoad, qDisplay;
    if (plateLoadType === 'point') {
      load = platePointLoad;
      totalLoad = platePointLoad;
      qDisplay = `${platePointLoad} lb point`;
    } else {
      // UDL — convert entry mode to q (psi)
      const plateAreaSqft = (plateA * plateB) / 144;
      let qPsf;
      if (plateUdlEntry === 'total') {
        qPsf = plateLoadTotal / plateAreaSqft;
        qDisplay = `${plateLoadTotal} lb total → ${qPsf.toFixed(1)} psf`;
      } else {
        qPsf = plateLoad;
        qDisplay = `${plateLoad} psf`;
      }
      load = qPsf / 144; // psi
      totalLoad = qPsf * plateAreaSqft;
    }
    const r = calcPlate(matForPlate, plateT, aUsed, bUsed, load, plateCase, plateLoadType);
    return {
      ...r,
      totalLoad,
      qDisplay,
      caseName: PLATE_CASES[plateCase].name,
      description: PLATE_CASES[plateCase].description,
      aUsed, bUsed,
      loadType: plateLoadType,
    };
  }, [mode, plateCase, plateLoadType, plateUdlEntry, material, E_effective, plateT, plateA, plateB, plateLoad, plateLoadTotal, platePointLoad]);

  // ===== Common assessment =====
  const assess = (deltaIn, spanIn) => {
    const ratio = spanIn / deltaIn;
    if (ratio >= 720) return { label: 'Excellent — imperceptible', color: '#2d6a4f' };
    if (ratio >= 360) return { label: 'Good — typical floor standard', color: '#4a7c59' };
    if (ratio >= 240) return { label: 'Acceptable for most cabinetry', color: '#a07d2a' };
    if (ratio >= 180) return { label: 'Marginal — noticeable on bench tops', color: '#b8651e' };
    if (ratio >= 120) return { label: 'Poor — visibly bowed', color: '#a8401e' };
    return { label: 'Failing — increase thickness or add support', color: '#7d1f1f' };
  };

  return (
    <div style={{ background: colors.bg, color: colors.ink, minHeight: '100vh', fontFamily: 'Georgia, "Times New Roman", serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap');
        .display-font { font-family: 'Cormorant Garamond', Georgia, serif; }
        .mono-font { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        .grid-paper {
          background-image:
            linear-gradient(${colors.rule}40 1px, transparent 1px),
            linear-gradient(90deg, ${colors.rule}40 1px, transparent 1px);
          background-size: 16px 16px;
        }
        select, input { font-family: 'JetBrains Mono', monospace; }
        .toggle-btn {
          padding: 0.5rem 1.25rem;
          border: 1px solid ${colors.ink};
          background: transparent;
          font-size: 0.75rem;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          cursor: pointer;
          transition: all 0.15s;
        }
        .toggle-btn.active {
          background: ${colors.ink};
          color: ${colors.bg};
        }
        .stat-block {
          border-left: 3px solid ${colors.accent};
          padding: 0.75rem 1rem;
          background: ${colors.highlight};
        }
      `}</style>

      <div className="max-w-6xl mx-auto px-6 py-10">

        {/* ===== HEADER ===== */}
        <header className="mb-10 pb-6" style={{ borderBottom: `2px solid ${colors.ink}` }}>
          <div className="flex justify-between items-end mb-3">
            <div>
              <div className="mono-font text-xs mb-2" style={{ color: colors.muted, letterSpacing: '0.2em' }}>
                STRUCTURAL · DEFLECTION · WORKSHEET
              </div>
              <h1 className="display-font text-5xl font-bold leading-none" style={{ letterSpacing: '-0.02em' }}>
                Deflection Calculator
              </h1>
              <p className="mt-2 italic" style={{ color: colors.muted }}>
                Beams &amp; plates · cabinetwork and shop joinery · imperial units
              </p>
            </div>
            <div className="mono-font text-xs text-right" style={{ color: colors.muted }}>
              <div style={{ color: colors.ink, letterSpacing: '0.15em', fontWeight: 600 }}>ECHT WORKS</div>
              <div className="mt-0.5">REV — 2026</div>
              <div>PG. 01 / 01</div>
            </div>
          </div>

          {/* First-time intro — explains the basics for non-engineers */}
          <details className="mt-4">
            <summary className="cursor-pointer mono-font text-xs"
                     style={{ color: colors.accent2, letterSpacing: '0.05em' }}>
              <span style={{
                display: 'inline-block',
                width: '14px', height: '14px',
                border: `1px solid ${colors.accent2}`,
                borderRadius: '50%',
                textAlign: 'center', lineHeight: '12px',
                fontSize: '10px', fontWeight: 700,
                marginRight: '6px',
              }}>?</span>
              First time here? What does this thing do?
            </summary>
            <div className="mt-3 p-4 text-sm leading-relaxed" style={{
              background: colors.panel,
              border: `1px solid ${colors.rule}`,
              borderLeft: `3px solid ${colors.accent2}`,
            }}>
              <p className="mb-3">
                <strong>This calculator predicts how much a piece of wood (or other material) will sag under load.</strong> Useful when you're designing a shelf, bench, table, or anything else that needs to hold weight without bowing too much.
              </p>
              <p className="mb-3">
                <strong>Pick the mode that matches your situation:</strong>
              </p>
              <p className="mb-2 ml-3">
                <strong>Beam</strong> — for anything supported on 1 or 2 sides, like a shelf in a bookcase, a bench top spanning between two cabinets, or a floating shelf bracketed to a wall. Behaves like a simple span.

              <p className="mb-3 ml-3">
                <strong>Plate</strong> — for anything supported on 3 or 4 sides, like a drawer bottom (supported by all four walls of the drawer), a tabletop dropped into a frame, or a bench top with end cabinets PLUS a back stringer.

                    <br/><br/>
                    <strong>Use parallel</strong> (default) for normal cabinetwork: a beam where
                    the grain runs along the long axis, or a top whose grain runs along the bench length.
                    <br/><br/>
                    <strong>Use perpendicular</strong> only when you've intentionally oriented grain across
                    the span — e.g., a butcher-block end-grain top loaded edgewise, or a breadboard end loaded as a beam.
                    <br/><br/>
                    Plywood and engineered panels are listed with their effective in-plane E and behave nearly

              )}

              <div className="mt-3 grid grid-cols-3 gap-3 mono-font text-xs" style={{ color: colors.muted }}>

                      <div className="flex justify-between"><span>aspect b/a</span><span style={{ color: colors.ink }}>{plateResult.ratio.toFixed(2)}</span></div>
                      <div className="flex justify-between"><span>D (flexural rig.)</span><span style={{ color: colors.ink }}>{plateResult.D.toFixed(0)} lb·in</span></div>
                      <div className="flex justify-between"><span>{plateResult.loadType === 'point' ? 'P' : 'q'}</span><span style={{ color: colors.ink, textAlign: 'right', maxWidth: '60%', fontSize: '0.7rem' }}>{plateResult.qDisplay}</span></div>
                      <div className="flex justify-between"><span>total load</span><span style={{ color: colors.ink }}>{plateResult.totalLoad.toFixed(1)} lb</span></div>
                      <div className="flex justify-between"><span>thickness</span><span style={{ color: colors.ink }}>{plateT}″</span></div>
                    </div>

                    <div className="mt-4 pt-3 mono-font text-xs italic" style={{ borderTop: `1px dashed ${colors.rule}`, color: colors.muted }}>
                      {plateResult.loadType === 'point'
                        ? <>δ = α · P · a² / D &nbsp;&nbsp; D = E·t³ / 12(1−ν²)</>
                        : <>δ = α · q · a⁴ / D &nbsp;&nbsp; D = E·t³ / 12(1−ν²)</>
                      }
                    </div>
                  </>
                )}
              </div>

              {/* Reference card */}
              <div className="mt-6 p-4 border" style={{ borderColor: colors.rule, background: colors.panel }}>
                <div className="mono-font text-xs uppercase mb-2" style={{ letterSpacing: '0.1em', color: colors.muted }}>
                  Deflection guidelines
                </div>
                <div className="text-xs space-y-1" style={{ color: colors.ink }}>
                  <div><span className="mono-font font-bold">L/720</span> — premium / imperceptible</div>
                  <div><span className="mono-font font-bold">L/360</span> — floor live load standard (IBC)</div>
                  <div><span className="mono-font font-bold">L/240</span> — typical cabinet shelf, total load</div>
                  <div><span className="mono-font font-bold">L/180</span> — minimum for unseen framing</div>
                </div>
                <div className="mt-3 text-xs italic" style={{ color: colors.muted }}>
                  Wood deflection neglects creep; long-term sustained loads can deflect 1.5–2× short-term values.
                </div>
              </div>
            </div>
          </div>

        </div>

        {/* ===== FOOTER NOTES ===== */}
        <footer className="mt-12 pt-6 text-xs" style={{ borderTop: `1px solid ${colors.rule}`, color: colors.muted }}>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <div className="mono-font uppercase mb-2" style={{ letterSpacing: '0.1em' }}>Beam formulas — sources</div>
              <div className="italic">Roark's Formulas for Stress and Strain (8th ed.); AISC Steel Construction Manual.</div>
            </div>
            <div>
              <div className="mono-font uppercase mb-2" style={{ letterSpacing: '0.1em' }}>Plate coefficients — sources</div>
              <div className="italic">UDL: Timoshenko &amp; Woinowsky-Krieger, Theory of Plates and Shells, 2nd ed., tables 8, 35, 46. Point load: tables 23, 36 (4-edge), Roark Table 11.4 (3-edge SS, 1 free). Linearly interpolated by aspect ratio; small-deflection theory only (δ &lt; t).</div>
            </div>
            <div>
              <div className="mono-font uppercase mb-2" style={{ letterSpacing: '0.1em' }}>Wood E values &amp; orthotropy</div>
              <div className="italic">USDA Wood Handbook FPL-GTR-190, clear wood at 12% MC, parallel to grain. E_perpendicular ratios from Table 5-1 (E_radial / E_L). Real lumber 70–90% of clear values; allow margin. Long-term sustained loads creep 1.5–2× short-term.</div>
            </div>
          </div>

          {/* Echt Works mark */}
          <div className="mt-8 pt-6 flex justify-between items-baseline" style={{ borderTop: `1px solid ${colors.rule}` }}>
            <div className="mono-font" style={{ letterSpacing: '0.15em', color: colors.muted }}>
              <span style={{ color: colors.ink, fontWeight: 600 }}>ECHT WORKS</span>
              <span className="mx-2">·</span>
              <span>Jon Echt</span>
              <span className="mx-2">·</span>
              <span>Gradyville, PA</span>
            </div>
            <div className="mono-font italic" style={{ color: colors.rule }}>
              echt works.
            </div>
          </div>
        </footer>

      </div>
    </div>
  );
}

root.render(React.createElement(DeflectionCalculator));
